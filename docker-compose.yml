services:
  mongodb:
    image: mongo:8
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: kleecode

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    healthcheck:
      test: ["CMD-SHELL", "OLLAMA_HOST=http://127.0.0.1:11434 ollama list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  ollama-model:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: ["pull", "${KLEE_LLM_MODEL_TO_PULL:-qwen2.5-coder:14b}"]
    restart: "no"

  backend:
    build:
      context: ./backend
    ports:
      - "8080:8080"
    depends_on:
      mongodb:
        condition: service_started
      ollama-model:
        condition: service_completed_successfully
    environment:
      MONGODB_URI: mongodb://mongodb:27017/kleecode
      KLEE_LLM_BASE_URL: http://ollama:11434
      KLEE_LLM_DEFAULT_MODEL: ${KLEE_LLM_DEFAULT_MODEL:-qwen2.5-coder:14b}
      KLEE_LLM_DEFAULT_TEMPERATURE: ${KLEE_LLM_DEFAULT_TEMPERATURE:-0.2}
      KLEE_LLM_DEFAULT_RESPONSE_LANGUAGE: ${KLEE_LLM_DEFAULT_RESPONSE_LANGUAGE:-Korean}

volumes:
  mongodb_data:
  ollama_data:
