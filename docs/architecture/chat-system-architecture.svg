<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1200" viewBox="0 0 1800 1200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="55%" stop-color="#fbfcff"/>
      <stop offset="100%" stop-color="#f8f7ff"/>
    </linearGradient>
    <linearGradient id="client" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e8f2ff"/>
      <stop offset="100%" stop-color="#f7fbff"/>
    </linearGradient>
    <linearGradient id="backend" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9fff2"/>
      <stop offset="100%" stop-color="#f9fffb"/>
    </linearGradient>
    <linearGradient id="runtime" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f3edff"/>
      <stop offset="100%" stop-color="#fffaff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrowDark" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f172a"/>
    </marker>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPurple" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#16a34a"/>
    </marker>
    <marker id="arrowGray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#64748b"/>
    </marker>
    <style>
      .title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 42px; font-weight: 800; fill: #0f172a; }
      .subtitle { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 20px; font-weight: 500; fill: #475569; }
      .panel-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #0f172a; }
      .card-title { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #111827; }
      .body { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 15px; font-weight: 500; fill: #253044; }
      .small { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 13px; font-weight: 600; fill: #475569; }
      .tiny { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 12px; font-weight: 600; fill: #64748b; }
      .badge { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 17px; font-weight: 800; fill: #ffffff; }
      .line-label { font-family: "Apple SD Gothic Neo", "Noto Sans KR", Arial, sans-serif; font-size: 12px; font-weight: 800; fill: #334155; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 14px; font-weight: 700; fill: #1e293b; }
      .card { fill: #ffffff; stroke-width: 1.6; rx: 14; filter: url(#shadow); }
      .soft { fill: rgba(255,255,255,0.68); stroke: #dbeafe; stroke-width: 1.2; rx: 14; }
      .flow { fill: #ffffff; stroke: #dbeafe; stroke-width: 1.5; rx: 16; filter: url(#shadow); }
    </style>
  </defs>

  <rect width="1800" height="1200" fill="url(#bg)"/>
  <path d="M0 146 C260 90 385 175 612 115 C820 61 982 65 1205 119 C1425 172 1612 86 1800 136 L1800 0 L0 0 Z" fill="#eaf4ff" opacity="0.85"/>
  <path d="M0 1048 C245 996 408 1071 625 1023 C861 970 1032 1010 1238 1057 C1465 1109 1620 1017 1800 1054 L1800 1200 L0 1200 Z" fill="#f0ecff" opacity="0.68"/>

  <text x="42" y="58" class="title">Klee Code - System Architecture V2</text>
  <text x="44" y="92" class="subtitle">Agent Orchestrator, Tool Policy, 중앙 LLM Gateway, 로컬 Tool Executor 경계를 반영한 온프레미스 구조</text>

  <rect x="1248" y="28" width="510" height="84" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.4"/>
  <line x1="1276" y1="52" x2="1324" y2="52" stroke="#0f172a" stroke-width="2.2" marker-end="url(#arrowDark)"/>
  <text x="1338" y="57" class="small">HTTP 요청 + JWT</text>
  <line x1="1510" y1="52" x2="1560" y2="52" stroke="#2563eb" stroke-width="2.4" stroke-dasharray="7 7" marker-end="url(#arrowBlue)"/>
  <text x="1573" y="57" class="small">SSE 스트림</text>
  <line x1="1276" y1="86" x2="1324" y2="86" stroke="#7c3aed" stroke-width="2.4" stroke-dasharray="4 6" marker-end="url(#arrowPurple)"/>
  <text x="1338" y="91" class="small">Agent tool loop</text>
  <line x1="1510" y1="86" x2="1560" y2="86" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 6" marker-end="url(#arrowGray)"/>
  <text x="1573" y="91" class="small">DB / 감사 기록</text>

  <g id="client-panel">
    <rect x="38" y="134" width="482" height="812" rx="20" fill="url(#client)" stroke="#60a5fa" stroke-width="2"/>
    <circle cx="78" cy="171" r="22" fill="#2563eb"/>
    <text x="71" y="178" class="badge">1</text>
    <text x="116" y="180" class="panel-title">VS Code Extension</text>
    <text x="116" y="205" class="small">Client Boundary</text>

    <rect x="70" y="218" width="410" height="138" class="card" stroke="#93c5fd"/>
    <rect x="92" y="242" width="48" height="48" rx="10" fill="#dbeafe" stroke="#60a5fa"/>
    <path d="M103 257 H129 M103 270 H122 M103 283 H132" stroke="#1d4ed8" stroke-width="3" stroke-linecap="round"/>
    <text x="160" y="254" class="card-title">Webview UI (React)</text>
    <text x="160" y="283" class="body">ChatView, ChatInput, Settings</text>
    <text x="160" y="310" class="body">로그인 상태와 선택 모델 표시</text>
    <text x="160" y="337" class="body">SSE 이벤트로 화면 실시간 갱신</text>

    <rect x="70" y="384" width="410" height="157" class="card" stroke="#93c5fd"/>
    <rect x="92" y="411" width="48" height="48" rx="12" fill="#eff6ff" stroke="#60a5fa"/>
    <path d="M116 420 L132 431 L132 451 L116 462 L100 451 L100 431 Z" fill="none" stroke="#1d4ed8" stroke-width="3"/>
    <text x="160" y="419" class="card-title">Extension Host (TypeScript)</text>
    <text x="160" y="449" class="body">AuthSession + SecretStorage</text>
    <text x="160" y="476" class="body">ChatWebviewMessageHandler</text>
    <text x="160" y="503" class="body">401 갱신 후 1회 재시도</text>
    <text x="160" y="530" class="body">/chat/stream, /agent/stream 중계</text>

    <rect x="70" y="570" width="410" height="124" class="card" stroke="#cbd5e1"/>
    <rect x="92" y="596" width="48" height="48" rx="10" fill="#f8fafc" stroke="#94a3b8"/>
    <path d="M108 608 L98 620 L108 632 M124 608 L134 620 L124 632" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="160" y="609" class="card-title">Local IDE Context</text>
    <text x="160" y="640" class="body">activeTextEditor, 선택 코드</text>
    <text x="160" y="667" class="body">파일 경로, 언어, 주변 코드 조각</text>

    <rect x="70" y="722" width="410" height="176" class="card" stroke="#a78bfa"/>
    <rect x="92" y="751" width="48" height="48" rx="10" fill="#f3e8ff" stroke="#a78bfa"/>
    <path d="M104 773 H128 M116 761 V785 M101 791 H131" stroke="#7c3aed" stroke-width="3" stroke-linecap="round"/>
    <text x="160" y="754" class="card-title">Local Tool Executor</text>
    <text x="160" y="784" class="body">read_file, search_files</text>
    <text x="160" y="811" class="body">워크스페이스 내부에서만 실행</text>
    <text x="160" y="838" class="body">v1 자동 실행은 읽기 전용 tool</text>
    <text x="160" y="865" class="body">승인 모드: ask / approve / full</text>
  </g>

  <g id="backend-panel">
    <rect x="566" y="134" width="690" height="812" rx="20" fill="url(#backend)" stroke="#22c55e" stroke-width="2"/>
    <circle cx="608" cy="171" r="22" fill="#16a34a"/>
    <text x="601" y="178" class="badge">2</text>
    <text x="646" y="180" class="panel-title">Spring Boot Backend</text>
    <text x="646" y="205" class="small">Modular Monolith / Policy Boundary</text>

    <rect x="598" y="216" width="626" height="74" rx="14" fill="#f0fdf4" stroke="#86efac" stroke-width="1.6"/>
    <text x="625" y="248" class="card-title">Security / Auth</text>
    <text x="625" y="276" class="body">JwtAuthenticationFilter -> AuthenticatedUser(userId, roles), refresh token session TTL</text>

    <rect x="598" y="322" width="285" height="150" class="card" stroke="#86efac"/>
    <text x="624" y="357" class="card-title">Chat Domain</text>
    <text x="624" y="388" class="mono">/chat/stream</text>
    <text x="624" y="416" class="body">ChatController, ChatService</text>
    <text x="624" y="443" class="body">progress / token / done SSE</text>

    <rect x="915" y="322" width="285" height="150" class="card" stroke="#a78bfa"/>
    <text x="941" y="357" class="card-title">Agent Orchestrator</text>
    <text x="941" y="388" class="mono">/agent/stream</text>
    <text x="941" y="416" class="body">AgentService tool calling loop</text>
    <text x="941" y="443" class="body">tool_call_requested 이벤트 생성</text>

    <rect x="598" y="506" width="285" height="150" class="card" stroke="#fbbf24"/>
    <text x="624" y="541" class="card-title">Prompt Assembly</text>
    <text x="624" y="572" class="body">system prompt + skill command</text>
    <text x="624" y="599" class="body">코드 컨텍스트와 권한 모드 주입</text>
    <text x="624" y="626" class="body">conversationId 기반 맥락 유지</text>

    <rect x="915" y="506" width="285" height="150" class="card" stroke="#a78bfa"/>
    <text x="941" y="541" class="card-title">Tool Policy / Registry</text>
    <text x="941" y="572" class="body">ToolPolicyService</text>
    <text x="941" y="599" class="body">ToolResultRegistry</text>
    <text x="941" y="626" class="body">읽기 전용 tool 허용 범위 검증</text>

    <rect x="598" y="690" width="185" height="150" class="card" stroke="#86efac"/>
    <text x="622" y="725" class="card-title">Conversation</text>
    <text x="622" y="756" class="body">목록 / 상세 / 삭제</text>
    <text x="622" y="783" class="body">턴 시작, 성공 기록</text>
    <text x="622" y="810" class="body">userId + convId 검증</text>

    <rect x="807" y="690" width="185" height="150" class="card" stroke="#86efac"/>
    <text x="831" y="725" class="card-title">Audit</text>
    <text x="831" y="756" class="body">externalTransfer=false</text>
    <text x="831" y="783" class="body">요청 / 응답 / 오류</text>
    <text x="831" y="810" class="body">모델 provider 기록</text>

    <rect x="1015" y="690" width="185" height="150" class="card" stroke="#86efac"/>
    <text x="1039" y="725" class="card-title">User / Preference</text>
    <text x="1039" y="756" class="body">selectedModel</text>
    <text x="1039" y="783" class="body">temperature</text>
    <text x="1039" y="810" class="body">responseLanguage</text>

    <rect x="694" y="866" width="430" height="66" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="1.8"/>
    <text x="733" y="895" class="card-title">Internal LLM Gateway</text>
    <text x="733" y="919" class="small">운영자 설정 기반 Ollama ChatClient + allow-list 검증</text>
  </g>

  <g id="runtime-panel">
    <rect x="1300" y="134" width="462" height="812" rx="20" fill="url(#runtime)" stroke="#8b5cf6" stroke-width="2"/>
    <circle cx="1342" cy="171" r="22" fill="#7c3aed"/>
    <text x="1335" y="178" class="badge">3</text>
    <text x="1382" y="180" class="panel-title">Data / Model Runtime</text>

    <rect x="1334" y="218" width="392" height="258" class="card" stroke="#a78bfa"/>
    <text x="1362" y="254" class="card-title">MongoDB</text>
    <text x="1362" y="286" class="body">users</text>
    <text x="1362" y="316" class="body">sessions</text>
    <text x="1362" y="346" class="body">user_preferences</text>
    <text x="1362" y="376" class="body">conversations</text>
    <text x="1362" y="406" class="body">ai_chat_memory</text>
    <text x="1362" y="436" class="body">audit_logs</text>
    <text x="1548" y="254" class="small">대화 메모리와 감사 기록</text>

    <rect x="1334" y="516" width="392" height="208" class="card" stroke="#22c55e"/>
    <text x="1362" y="552" class="card-title">Internal Ollama Runtime</text>
    <text x="1362" y="584" class="body">사내 네트워크 내부에서만 접근</text>
    <text x="1362" y="614" class="body">운영자 관리 base-url</text>
    <text x="1362" y="644" class="body">Qwen, DeepSeek 등 승인 모델</text>
    <text x="1362" y="674" class="body">LLM prompt / token stream</text>

    <rect x="1334" y="764" width="392" height="134" rx="14" fill="#fff7ed" stroke="#fb923c" stroke-width="1.6"/>
    <text x="1362" y="800" class="card-title">Security Boundary</text>
    <text x="1362" y="832" class="body">사용자별 모델 서버 URL 저장 없음</text>
    <text x="1362" y="862" class="body">외부 AI 서비스 전송 없음</text>
    <text x="1362" y="892" class="body">감사 로그에 externalTransfer=false</text>
  </g>

  <g id="main-flows">
    <path d="M480 444 C520 444 536 404 598 397" fill="none" stroke="#0f172a" stroke-width="2.4" marker-end="url(#arrowDark)"/>
    <rect x="492" y="389" width="135" height="24" rx="8" fill="#ffffff" opacity="0.9"/>
    <text x="500" y="406" class="line-label">POST /chat/stream + JWT</text>
    <path d="M598 431 C538 450 523 492 480 500" fill="none" stroke="#2563eb" stroke-width="2.6" stroke-dasharray="8 8" marker-end="url(#arrowBlue)"/>
    <rect x="492" y="474" width="136" height="24" rx="8" fill="#ffffff" opacity="0.9"/>
    <text x="500" y="491" class="line-label">progress / token / done</text>

    <path d="M480 800 C565 800 822 390 915 386" fill="none" stroke="#7c3aed" stroke-width="2.4" marker-end="url(#arrowPurple)"/>
    <rect x="500" y="724" width="192" height="24" rx="8" fill="#ffffff" opacity="0.92"/>
    <text x="508" y="741" class="line-label">POST /agent/stream + approval mode</text>
    <path d="M915 442 C774 499 627 721 480 806" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="5 7" marker-end="url(#arrowPurple)"/>
    <rect x="568" y="632" width="136" height="24" rx="8" fill="#ffffff" opacity="0.9"/>
    <text x="576" y="649" class="line-label">tool_call_requested SSE</text>
    <path d="M480 845 C632 872 840 650 915 612" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-dasharray="5 7" marker-end="url(#arrowPurple)"/>
    <rect x="550" y="868" width="150" height="24" rx="8" fill="#ffffff" opacity="0.92"/>
    <text x="558" y="885" class="line-label">POST /agent/tool-results</text>

    <path d="M741 472 L741 506" fill="none" stroke="#0f172a" stroke-width="2" marker-end="url(#arrowDark)"/>
    <path d="M1058 472 L1058 506" fill="none" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
    <path d="M884 581 L915 581" fill="none" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
    <path d="M740 656 C744 690 765 708 807 742" fill="none" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#arrowGray)"/>
    <path d="M1058 656 C1058 676 1052 688 1030 704" fill="none" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#arrowGray)"/>
    <path d="M900 840 L900 872" fill="none" stroke="#16a34a" stroke-width="2.4" marker-end="url(#arrowGreen)"/>

    <path d="M1124 899 C1190 896 1233 666 1334 626" fill="none" stroke="#16a34a" stroke-width="3" marker-end="url(#arrowGreen)"/>
    <rect x="1146" y="794" width="126" height="24" rx="8" fill="#ffffff" opacity="0.9"/>
    <text x="1154" y="811" class="line-label">LLM prompt / stream</text>
    <path d="M1334 650 C1225 700 1192 882 1124 910" fill="none" stroke="#16a34a" stroke-width="2.6" stroke-dasharray="7 7" marker-end="url(#arrowGreen)"/>
    <rect x="1174" y="908" width="96" height="24" rx="8" fill="#ffffff" opacity="0.9"/>
    <text x="1182" y="925" class="line-label">응답 토큰 반환</text>

    <path d="M1200 408 C1258 356 1278 322 1334 302" fill="none" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#arrowGray)"/>
    <path d="M1200 750 C1260 744 1284 438 1334 410" fill="none" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#arrowGray)"/>
    <path d="M992 765 C1158 790 1232 458 1334 444" fill="none" stroke="#64748b" stroke-width="2.2" stroke-dasharray="2 7" marker-end="url(#arrowGray)"/>
  </g>

  <g id="bottom-flows">
    <rect x="38" y="980" width="820" height="162" class="flow"/>
    <text x="66" y="1020" class="panel-title">일반 채팅 흐름</text>
    <rect x="66" y="1048" width="145" height="62" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="91" y="1084" class="body">Webview 입력</text>
    <path d="M211 1079 L258 1079" stroke="#0f172a" stroke-width="2" marker-end="url(#arrowDark)"/>
    <rect x="258" y="1048" width="160" height="62" rx="12" fill="#f0fdf4" stroke="#86efac"/>
    <text x="285" y="1084" class="body">JWT 인증</text>
    <path d="M418 1079 L465 1079" stroke="#0f172a" stroke-width="2" marker-end="url(#arrowDark)"/>
    <rect x="465" y="1048" width="166" height="62" rx="12" fill="#fff7ed" stroke="#fdba74"/>
    <text x="488" y="1084" class="body">LLMGateway</text>
    <path d="M631 1079 L678 1079" stroke="#0f172a" stroke-width="2" marker-end="url(#arrowDark)"/>
    <rect x="678" y="1048" width="150" height="62" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="707" y="1075" class="body">SSE 토큰</text>
    <text x="703" y="1098" class="body">화면 반영</text>

    <rect x="900" y="980" width="862" height="162" class="flow"/>
    <text x="928" y="1020" class="panel-title">Agent Tool Calling 흐름</text>
    <rect x="928" y="1048" width="148" height="62" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="953" y="1084" class="body">승인 모드</text>
    <path d="M1076 1079 L1120 1079" stroke="#7c3aed" stroke-width="2.2" marker-end="url(#arrowPurple)"/>
    <rect x="1120" y="1048" width="168" height="62" rx="12" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="1146" y="1084" class="body">tool 요청 감지</text>
    <path d="M1288 1079 L1332 1079" stroke="#7c3aed" stroke-width="2.2" stroke-dasharray="5 6" marker-end="url(#arrowPurple)"/>
    <rect x="1332" y="1048" width="168" height="62" rx="12" fill="#eff6ff" stroke="#93c5fd"/>
    <text x="1353" y="1075" class="body">Extension Host</text>
    <text x="1350" y="1098" class="body">로컬 read-only 실행</text>
    <path d="M1500 1079 L1544 1079" stroke="#7c3aed" stroke-width="2.2" stroke-dasharray="5 6" marker-end="url(#arrowPurple)"/>
    <rect x="1544" y="1048" width="170" height="62" rx="12" fill="#ecfdf5" stroke="#86efac"/>
    <text x="1567" y="1075" class="body">observation 반영</text>
    <text x="1588" y="1098" class="body">최종 답변</text>
  </g>
</svg>
