spring:
  application:
    name: backend
  mongodb:
    uri: ${MONGODB_URI:mongodb://localhost:27017/kleecode}
    auto-index-creation: true
klee:
  llm:
    provider: ollama
    base-url: ${KLEE_LLM_BASE_URL:http://ollama:11434}
    default-model: ${KLEE_LLM_DEFAULT_MODEL:qwen2.5-coder:7b}
    default-temperature: ${KLEE_LLM_DEFAULT_TEMPERATURE:0.2}
    default-response-language: ${KLEE_LLM_DEFAULT_RESPONSE_LANGUAGE:Korean}
klee-code:
  security:
    jwt-secret: ${KLEE_CODE_JWT_SECRET:dev-only-change-me-dev-only-change-me}
    access-token-ttl-minutes: ${KLEE_CODE_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${KLEE_CODE_REFRESH_TOKEN_TTL_DAYS:14}
