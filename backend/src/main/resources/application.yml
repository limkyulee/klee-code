spring:
  application:
    name: backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/kleecode}
      auto-index-creation: true
  ai:
    model:
      chat: ${KLEE_CODE_AI_PROVIDER:anthropic}
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        model: ${OLLAMA_MODEL:qwen2.5-coder:3b}
klee-code:
  security:
    jwt-secret: ${KLEE_CODE_JWT_SECRET:dev-only-change-me-dev-only-change-me}
    access-token-ttl-minutes: ${KLEE_CODE_ACCESS_TOKEN_TTL_MINUTES:15}
    refresh-token-ttl-days: ${KLEE_CODE_REFRESH_TOKEN_TTL_DAYS:14}
